<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Profile</title>

<style>
:root {
    --primary-cyan: #00d4ff;
    --deep-navy: #060b28;
    --glass-white: rgba(255, 255, 255, 0.05);
    --text-gray: #a0aec0;
}

* {
    box-sizing: border-box;
}

body {
    background-color: var(--deep-navy);
    background-image:
        radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0, 212, 255, 0.05) 0%, transparent 40%);
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    color: white;
    padding: 20px;
}

.profile-card {
    background: var(--glass-white);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    padding-bottom: 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    overflow: hidden;
}

.header-visual {
    height: 140px;
    background-size: cover;
    background-position: center;
    position: relative;
}

.header-visual::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.2);
}

.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 5px solid var(--deep-navy);
    margin-top: -60px;
    object-fit: cover;
    background: #1a202c;
    position: relative;
    z-index: 10;
}

.content {
    padding: 0 30px;
}

h1 {
    font-size: 1.5rem;
    margin: 15px 0 5px;
}

.title {
    color: var(--primary-cyan);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.8rem;
    letter-spacing: 1.2px;
    margin-bottom: 15px;
}

.company-link {
    color: var(--text-gray);
    text-decoration: none;
    font-size: 0.9rem;
}

.bio {
    font-size: 0.9rem;
    color: var(--text-gray);
    line-height: 1.6;
    margin: 20px 0;
}

.skills-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 25px;
}

.skill-tag {
    background: rgba(0, 212, 255, 0.1);
    color: var(--primary-cyan);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    border: 1px solid rgba(0, 212, 255, 0.2);
}

.actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.btn {
    padding: 12px;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    font-size: 0.85rem;
    border: none;
}

.btn-primary {
    background: var(--primary-cyan);
    color: var(--deep-navy);
}

.btn-primary:hover {
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
}

.btn-outline {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
}

#contact-reveal {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    font-size: 0.8rem;
    display: none;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
async function loadEmployees() {
    const res = await fetch('employees.json');
    if (!res.ok) throw new Error('Failed to load employees');
    return res.json();
}

    function createProfile(employee) {

    const card = document.createElement('div');
    card.className = 'profile-card';

    card.innerHTML = `
        <div class="header-visual"></div>
        <div class="content">
            <img class="profile-img" alt="">
            <h1></h1>
            <div class="title"></div>
            <a class="company-link" target="_blank"></a>
            <p class="bio"></p>
            <div class="skills-container"></div>
            <div class="actions">
                <a class="btn btn-primary" target="_blank">Connect on LinkedIn</a>
                <button class="btn btn-outline">Download Contact</button>
            </div>
        </div>
    `;

    // Header cover
    card.querySelector('.header-visual').style.backgroundImage =
        `url('${employee.cover || "cover.png"}')`;

    // Profile image
    const img = card.querySelector('.profile-img');
    img.src = employee.image;
    img.alt = employee.name;

    // Basic info
    card.querySelector('h1').textContent = employee.name;
    card.querySelector('.title').textContent = employee.position;
    card.querySelector('.company-link').textContent = employee.company;
    card.querySelector('.company-link').href = employee.website || "#";
    card.querySelector('.bio').textContent = employee.bio || "";

    // Skills
    const skillsContainer = card.querySelector('.skills-container');
    (employee.skills || []).forEach(skill => {
        const span = document.createElement('span');
        span.className = 'skill-tag';
        span.textContent = skill;
        skillsContainer.appendChild(span);
    });

    // LinkedIn button
    card.querySelector('.btn-primary').href = employee.linkedin || "#";

    // Download vCard button for GitHub Pages
    const downloadBtn = card.querySelector('.btn-outline');
   downloadBtn.addEventListener('click', () => {
    if (!employee.vCard) return;

    // Use a relative path so it stays within your GitHub repo folder
    const fileUrl = `./${employee.vCard}`; 
    
    const link = document.createElement('a');
    link.href = fileUrl;
    link.download = employee.vCard; // Suggests the filename to the browser
    
    // Append, click, and cleanup
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
});

    return card;
}

(async function init() {
    const app = document.getElementById('app');
    const params = new URLSearchParams(window.location.search);
    const empId = params.get('id');

    try {
        const employees = await loadEmployees();
        const employee = empId
            ? employees.find(e => e.id === empId)
            : employees[0];

        if (!employee) {
            app.textContent = "Employee not found.";
            return;
        }

        app.appendChild(createProfile(employee));

    } catch (err) {
        app.textContent = "Error loading profile.";
        console.error(err);
    }
})();
</script>

</body>

</html>
